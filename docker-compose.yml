# Local development database for Mini AIP / Context Hub.
# Production uses managed PostgreSQL with at-rest encryption + TLS (SECURITY-01).
services:
  db:
    image: postgres:16.3
    environment:
      POSTGRES_USER: miniaip
      POSTGRES_PASSWORD: miniaip
      POSTGRES_DB: mini_aip
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniaip -d mini_aip"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
